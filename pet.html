<!DOCTYPE html>
<html lang="en" class="scroll-smooth">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Pets allowed in Hogwarts</title>
<script src="https://cdn.tailwindcss.com"></script>
<link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css" rel="stylesheet">
<link href="https://fonts.googleapis.com/css2?family=Cinzel+Decorative:wght@400;700&family=UnifrakturCook:wght@700&family=Playfair+Display:ital,wght@400;700&display=swap" rel="stylesheet">

<style>
body {
    background: linear-gradient(135deg, #2a2540, #3a2f5c, #4a3c68);
    min-height: 100vh;
    font-family: 'Playfair Display', serif;
    overflow-x: hidden;
    color: #e0d4ff;
}

h1, h2, h3 {
    font-family: 'Cinzel Decorative', serif;
    letter-spacing: 3px;
}

.card {
    transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
    position: relative;
    background: rgba(255, 255, 255, 0.08);
    border-color: #6b5a9e;
}

.card:hover {
    transform: translateY(-12px) scale(1.03);
    box-shadow: 0 25px 50px -12px rgba(74, 60, 104, 0.6);
}

.overlay {
    background: linear-gradient(to top, rgba(74, 60, 104, 0.85), transparent);
}


nav {
    background: rgba(42, 37, 64, 0.95);
    backdrop-filter: blur(12px);
    border-bottom: 2px solid #6b5a9e;
}


#magical-horse {
    position: fixed;
    width: 120px;
    height: 120px;
    z-index: 10;
    pointer-events: none;
    filter: drop-shadow(0 0 25px #a5b4fc) brightness(1.2);
    opacity: 0;
    transition: all 0.8s ease-out;
    user-select: none;
    border-radius: 50%;
}
#magical-horse.visible {
    opacity: 0.85;
}
</style>
</head>
<body>


<img id="magical-horse" src="ich.png" alt="Magical Icy Horse">

<
<nav class="sticky top-0 z-50">
    <div class="max-w-7xl mx-auto px-6 py-5 flex justify-between items-center">
        <h1 class="text-4xl font-bold tracking-wider" style="color: #d4c4f5;">
            <span style="color: #b39ddb;">Pets</span> in Hogwarts
        </h1>
        <a href="index.html" class="flex items-center gap-2 bg-white/10 hover:bg-white/20 transition-all px-6 py-3 rounded-2xl font-medium border border-[#6b5a9e] hover:border-[#b39ddb]">
            <i class="fas fa-arrow-left"></i>
            Back to Home
        </a>
    </div>
</nav>

<div class="max-w-7xl mx-auto px-6 py-16">
    <div class="text-center mb-12">
        <h2 class="text-5xl font-bold mb-4 tracking-wider" style="color: #d4c4f5; font-family: 'UnifrakturCook', cursive;">
            Dracō dormiēns nunquam titillandus
        </h2>
        <p class="text-[#b39ddb] text-xl max-w-2xl mx-auto italic">
            "Never tickle a sleeping dragon"
        </p>
    </div>

   
    <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-4 gap-8">
        <div class="card rounded-3xl overflow-hidden border-2">
            <div class="relative h-80">
                <img src="hedwig.png" alt="Owls" class="w-full h-full object-cover">
                <div class="overlay absolute inset-0"></div>
                <div class="absolute bottom-0 left-0 p-6 w-full z-10">
                    <h3 class="text-3xl font-semibold mb-2">Owls</h3>
                    <p class="text-[#d4c4f5] text-sm">Wise messengers and loyal companions</p>
                </div>
            </div>
        </div>

        <div class="card rounded-3xl overflow-hidden border-2">
            <div class="relative h-80">
                <img src="cat.png" alt="Cats" class="w-full h-full object-cover">
                <div class="overlay absolute inset-0"></div>
                <div class="absolute bottom-0 left-0 p-6 w-full z-10">
                    <h3 class="text-3xl font-semibold mb-2">Cats</h3>
                    <p class="text-[#d4c4f5] text-sm">Elegant & mysterious familiars</p>
                </div>
            </div>
        </div>

        <div class="card rounded-3xl overflow-hidden border-2">
            <div class="relative h-80">
                <img src="toad.png" alt="Toads" class="w-full h-full object-cover">
                <div class="overlay absolute inset-0"></div>
                <div class="absolute bottom-0 left-0 p-6 w-full z-10">
                    <h3 class="text-3xl font-semibold mb-2">Toads</h3>
                    <p class="text-[#d4c4f5] text-sm">Traditional but underrated</p>
                </div>
            </div>
        </div>

        <div class="card rounded-3xl overflow-hidden border-2">
            <div class="relative h-80">
                <img src="crow.png" alt="Crows" class="w-full h-full object-cover">
                <div class="overlay absolute inset-0"></div>
                <div class="absolute bottom-0 left-0 p-6 w-full z-10">
                    <h3 class="text-3xl font-semibold mb-2">Crows</h3>
                    <p class="text-[#d4c4f5] text-sm">Special Permission Required</p>
                </div>
            </div>
        </div>
    </div>
</div>

<script>
// Random Icy Horse Jumper
const horse = document.getElementById('magical-horse');

function jumpHorse() {
    const x = Math.random() * (window.innerWidth - 150);
    const y = Math.random() * (window.innerHeight - 180);
    horse.style.left = `${x}px`;
    horse.style.top = `${y}px`;
    horse.classList.add('visible');
    setTimeout(() => horse.classList.remove('visible'), 2400);
}

setInterval(() => {
    if (Math.random() > 0.35) jumpHorse();
}, 2600);

setTimeout(jumpHorse, 800);
</script>
</body>
</html>
